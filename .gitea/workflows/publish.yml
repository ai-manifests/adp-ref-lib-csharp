name: Build and Publish NuGet Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: linux
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git checkout ${{ github.sha }}

      - name: Restore
        run: dotnet restore src/Adp.Manifest/Adp.Manifest.csproj

      - name: Build
        run: dotnet build src/Adp.Manifest/Adp.Manifest.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/Adp.Manifest.Tests/Adp.Manifest.Tests.csproj -c Release

      - name: Pack
        run: dotnet pack src/Adp.Manifest/Adp.Manifest.csproj -c Release --no-build -o ./nupkg

      - name: Publish to Gitea Packages
        run: |
          for pkg in nupkg/*.nupkg; do
            echo "Pushing $pkg..."
            dotnet nuget push "$pkg" \
              --source "https://git.marketally.com/api/packages/ai-manifests/nuget/index.json" \
              --api-key ${{ secrets.GITEATOKEN }} \
              --skip-duplicate
          done
